<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>CancerLess Daily Prevention Check-In</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    overflow-x:hidden;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#f4f7fb;
    color:#1f2937;
}

.hero{
    background:linear-gradient(135deg,#20c6c9,#0057a8);
    color:white;
    padding:24px 20px 70px;
    border-radius:0 0 28px 28px;
}

.hero h1{
    font-size:32px;
    font-weight:700;
    margin-bottom:8px;
}

.hero p{
    opacity:.95;
    line-height:1.5;
}

.container{
    max-width:700px;
    margin:auto;
}

.score-card{
    background:white;
    margin:-45px 18px 20px;
    border-radius:24px;
    padding:20px;
    box-shadow:0 8px 28px rgba(0,0,0,.08);
}

.score-top{
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.score-number{
    font-size:42px;
    font-weight:800;
    color:#0057a8;
}

.score-label{
    font-size:14px;
    color:#6b7280;
    margin-bottom:4px;
}

.streak{
    background:#fff4e5;
    color:#d97706;
    font-weight:700;
    padding:10px 16px;
    border-radius:30px;
}

.section{
    padding:0 18px 24px;
}

.card{
    background:white;
    border-radius:22px;
    padding:18px;
    margin-bottom:16px;
    box-shadow:0 4px 16px rgba(0,0,0,.05);
}

.card h3{
    font-size:18px;
    margin-bottom:8px;
}

.subtitle{
    color:#6b7280;
    font-size:14px;
    line-height:1.4;
    margin-bottom:14px;
}

.slider{
    width:100%;
    accent-color:#20c6c9;
}

.labels{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:#6b7280;
    margin-top:8px;
}

.score-badge{
    display:inline-block;
    margin-top:10px;
    background:#eaf5ff;
    color:#0057a8;
    padding:8px 14px;
    border-radius:12px;
    font-weight:700;
}

.chips{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.chip{
    padding:10px 16px;
    border-radius:30px;
    border:2px solid #20c6c9;
    cursor:pointer;
    transition:.2s;
    font-weight:600;
}

.chip.selected{
    background:#20c6c9;
    color:white;
}

textarea{
    width:100%;
    min-height:100px;
    border:1px solid #d1d5db;
    border-radius:14px;
    padding:12px;
    font-size:15px;
    resize:none;
}

.insight{
    background:#eef7ff;
    border-left:4px solid #0057a8;
    padding:14px;
    border-radius:12px;
    line-height:1.5;
}

.save-btn{
    width:calc(100% - 36px);
    margin:10px 18px 20px;
    border:none;
    border-radius:18px;
    padding:18px;
    color:white;
    font-size:18px;
    font-weight:700;
    background:linear-gradient(135deg,#20c6c9,#0057a8);
    cursor:pointer;
}

.result{
    display:none;
    margin:0 18px 18px;
    background:#ecfdf5;
    font-weight:700;
    color:#0057a8;
}

.section{
    margin:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    box-shadow:0 4px 16px rgba(0,0,0,.05);
    margin-bottom:16px;
}

.card h3{
    margin-bottom:8px;
    font-size:18px;
}

.subtitle{
    color:#6b7280;
    font-size:14px;
    margin-bottom:15px;
}

.slider{
    width:100%;
}

.score-badge{
    margin-top:12px;
    background:#eaf5ff;
    color:#0057a8;
    padding:8px 12px;
    border-radius:10px;
    display:inline-block;
    font-weight:600;
}

.labels{
    margin-top:8px;
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:#6b7280;
}

.chips{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
}

.chip{
    border:2px solid #20c6c9;
    padding:10px 16px;
    border-radius:30px;
    cursor:pointer;
    transition:.2s;
}

.chip.selected{
    background:#20c6c9;
    color:white;
}

textarea{
    width:100%;
    min-height:100px;
    border:1px solid #d1d5db;
    border-radius:12px;
    padding:12px;
    resize:none;
    font-family:inherit;
    font-size:15px;
}

.save-btn{
    margin:20px;
    width:calc(100% - 40px);
    border:none;
    border-radius:16px;
    padding:18px;
    color:white;
    font-size:18px;
    font-weight:700;
    background:linear-gradient(135deg,#20c6c9,#0057a8);
    cursor:pointer;
}

.result{
    display:none;
    margin:20px;
    padding:20px;
    background:#ecfdf5;
    border:1px solid #86efac;
    border-radius:16px;
    text-align:center;
}

.insight{
    background:#eef7ff;
    border-left:4px solid #0057a8;
    padding:14px;
    border-radius:10px;
    margin-top:10px;
    line-height:1.5;
}

.footer{
    text-align:center;
    color:#6b7280;
    font-size:12px;
    margin-top:25px;
}

.error-box{
    background:#dc2626;
    color:white;
    padding:15px;
    margin:15px;
    border-radius:10px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="hero">
    <h1>Daily Prevention Check-In</h1>
    <p>Small healthy habits today can lead to a healthier tomorrow.</p>
</div>

<div class="score-card">
    <div class="score-top">
        <div>
            <div style="font-weight:600;">Today's Wellness Score</div>
            <div class="score-number" id="wellnessScore">9</div>
        </div>

        <div class="streak">
            🔥 Daily Habit
        </div>
    </div>
</div>

<div class="section">

    <div class="card">
        <h3>🏃 Physical Activity</h3>
        <div class="subtitle">How active were you today?</div>

        <input class="slider" id="exercise" type="range" min="1" max="5" value="3">

        <div class="labels">
            <span>None</span>
