<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Ask EDDIE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #fdf8f2;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #c0714f;
      padding: 48px 18px 16px;
      border-radius: 0 0 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(192,113,79,0.25);
    }

    .header-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      background: transparent;
    }

    .header-icon img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    .header-text { flex: 1; }

    .header-title {
      color: white;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-sub {
      color: #f5d5c8;
      font-size: 12px;
      margin-top: 1px;
    }

    .online-indicator {
      display: flex; align-items: center; gap: 5px;
      flex-shrink: 0;
    }

    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #7eecc4;
    }

    .online-text { color: #f5d5c8; font-size: 11px; }

    .chat-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #fdf8f2;
    }

    iframe {
      position: absolute;
      top: -60px; left: 0;
      width: 100%;
      height: calc(100% + 60px);
      border: none;
    }

    .disclaimer {
      background: #fdf8f2;
      border-top: 0.5px solid #e8d5c5;
      padding: 6px 16px;
      font-size: 10px;
      color: #b09880;
      text-align: center;
      flex-shrink: 0;
      line-height: 1.4;
    }
  </style>
</head>
