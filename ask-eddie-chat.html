<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Ask EDDIE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #fdf8f2;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* HEADER */
    .header {
      background: #c0714f;
      padding: 14px 18px 18px;
      border-radius: 0 0 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(192,113,79,0.25);
    }
    .header-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .header-text { flex: 1; }
    .header-title {
      color: white;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .header-sub {
      color: #f5d5c8;
      font-size: 12px;
      margin-top: 1px;
    }
    .online-indicator {
      display: flex; align-items: center; gap: 5px;
      flex-shrink: 0;
    }
    .online-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #7eecc4;
    }
    .online-text { color: #f5d5c8; font-size: 11px; }

    /* CHIPS */
    .chips-scroll {
      display: flex;
      gap: 8px;
      padding: 10px 14px 6px;
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      background: #fdf8f2;
    }
    .chips-scroll::-webkit-scrollbar { display: none; }

    .chip {
      background: white;
      border: 1px solid #e8c5b5;
      color: #7a3d22;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      white-space: nowrap;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .chip:active { background: #fdf0e8; }

    /* WEBVIEW CONTAINER */
    .chat-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #fdf8f2;
    }

    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    /* DISCLAIMER */
    .disclaimer {
      background: #fdf8f2;
      border-top: 0.5px solid #e8d5c5;
      padding: 6px 16px;
      font-size: 10px;
      color: #b09880;
      text-align: center;
      flex-shrink: 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-icon">🎗️</div>
    <div class="header-text">
      <div class="header-title">Ask EDDIE</div>
      <div class="header-sub">Cancer Guidance and Support</div>
    </div>
    <div class="online-indicator">
      <div class="online-dot"></div>
      <div class="online-text">Online</div>
    </div>
  </div>

  <!-- SUGGESTION CHIPS -->
  <div class="chips-scroll" id="chips">
    <div class="chip" onclick="sendChip('What is a Gleason score?')">What is a Gleason score?</div>
    <div class="chip" onclick="sendChip('What are my treatment options?')">Treatment options</div>
    <div class="chip" onclick="sendChip('Tell me about clinical trials')">Clinical trials</div>
    <div class="chip" onclick="sendChip('What side effects should I expect?')">Side effects</div>
    <div class="chip" onclick="sendChip('Help me prepare questions for my doctor')">Prepare for appointment</div>
    <div class="chip" onclick="sendChip('What does my cancer staging mean?')">Cancer staging</div>
    <div class="chip" onclick="sendChip('Tell me about cancer screening options')">Screening options</div>
  </div>

  <!-- EMBEDDED AI AGENT -->
  <div class="chat-container">
    <iframe
      id="eddieFrame"
      src="https://copilotstudio.microsoft.com/environments/Default-55392b7f-41f9-468a-8aae-c256bc68afe5/bots/Default_eddie/webchat?__version__=2"
      allow="microphone; camera"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
      title="Ask EDDIE Cancer Education Copilot"
    ></iframe>
  </div>

  <!-- DISCLAIMER -->
  <div class="disclaimer">
    Eddie provides educational information only — not medical advice. Always consult your physician for personalized care.
  </div>

  <script>
    function sendChip(text) {
      const frame = document.getElementById('eddieFrame');
      try {
        frame.contentWindow.postMessage({ type: 'sendMessage', text: text }, '*');
      } catch(e) {
        console.log('Message send attempted:', text);
      }
      const chips = document.getElementById('chips');
      chips.style.display = 'none';
    }
  </script>

</body>
</html>
