<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>Eddie: Your Cancer Copilot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      -webkit-overflow-scrolling: touch;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* CancerLess teal header band */
    .cl-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      /* height set to comfortably clear the iPhone notch / status bar */
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 14px;
      background: linear-gradient(135deg, #2bb3b3 0%, #1d8f8f 100%);
      color: #ffffff;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
      box-shadow: 0 2px 10px rgba(29, 143, 143, 0.18);
    }
    .cl-logo {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cl-logo svg { width: 20px; height: 20px; }
    .cl-titles { line-height: 1.25; }
    .cl-title { font-size: 1.02rem; font-weight: 700; letter-spacing: -0.01em; }
    .cl-sub { font-size: 0.74rem; opacity: 0.9; font-weight: 500; }

    /* iframe sits below the header */
    .cl-frame-wrap {
      position: fixed;
      left: 0;
      width: 100%;
      /* top offset must match header height; uses safe-area + header content */
      top: calc(env(safe-area-inset-top, 0px) + 62px);
      bottom: 0;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>

  <!-- CancerLess teal header -->
  <div class="cl-header">
    <div class="cl-logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 3l7 4v6c0 4-3 6.5-7 8-4-1.5-7-4-7-8V7l7-4z" stroke="#ffffff" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M9.5 12.5l1.8 1.8 3.4-3.6" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="cl-titles">
      <div class="cl-title">Eddie: Your Cancer Copilot</div>
      <div class="cl-sub">Educational guidance &amp; support</div>
    </div>
  </div>

  <!-- Chat iframe -->
  <div class="cl-frame-wrap">
    <iframe
      src="https://copilotstudio.microsoft.com/environments/Default-55392b7f-41f9-468a-8aae-c256bc68afe5/bots/Default_eddie/webchat?__version__=2"
      allow="microphone; camera"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"
    ></iframe>
  </div>

</body>
</html>
