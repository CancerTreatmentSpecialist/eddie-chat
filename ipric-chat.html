<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>iPRiC — Prostate Risk & Information Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #F0F7FF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #1B6CA8;
      padding: 48px 18px 16px;
      border-radius: 0 0 20px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(27,108,168,0.25);
    }

    .header-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      background: white;
    }

    .header-icon img {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    .header-text { flex: 1; }

    .header-title {
      color: white;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-sub {
      color: #B3D4F0;
      font-size: 12px;
      margin-top: 1px;
    }

    .chat-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: #F0F7FF;
    }

    iframe {
      position: absolute;
      top: -60px; left: 0;
      width: 100%;
      height: calc(100% + 60px);
      border: none;
    }

    .disclaimer {
      background: #F0F7FF;
      border-top: 0.5px solid #B3D4F0;
      padding: 6px 16px;
      font-size: 10px;
      color: #4A6FA5;
      text-align: center;
      flex-shrink: 0;
      line-height: 1.4;
    }
  </style>
</head>
